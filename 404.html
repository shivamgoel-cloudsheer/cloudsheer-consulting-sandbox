<!DOCTYPE html>
<html>
  <head>
    <meta charset="utf-8" />
    <title>Cloudsheer Consulting</title>
    <script>
      // SPA redirect for GitHub Pages
      var path = window.location.pathname;
      var base = '/cloudsheer-consulting';
      var route = path.replace(base, '') || '/';
      sessionStorage.setItem('redirect', route);
      window.location.replace(base + '/');
    </script>
  </head>
  <body></body>
</html>
