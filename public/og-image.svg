<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 630" width="1200" height="630">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#032D60"/>
      <stop offset="0.5" stop-color="#0A3F80"/>
      <stop offset="1" stop-color="#0176D3"/>
    </linearGradient>
    <linearGradient id="gold" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0" stop-color="#F59E0B"/>
      <stop offset="1" stop-color="#FBBF24"/>
    </linearGradient>
    <pattern id="grid" width="48" height="48" patternUnits="userSpaceOnUse">
      <path d="M48 0 L0 0 0 48" fill="none" stroke="rgba(255,255,255,0.04)" stroke-width="1"/>
    </pattern>
  </defs>

  <rect width="1200" height="630" fill="url(#bg)"/>
  <rect width="1200" height="630" fill="url(#grid)"/>

  <circle cx="100" cy="100" r="200" fill="rgba(0,169,255,0.15)" filter="url(#blur)"/>
  <circle cx="1100" cy="500" r="160" fill="rgba(245,158,11,0.12)"/>

  <text x="80" y="180" fill="rgba(186,220,255,0.7)" font-family="Inter, system-ui, sans-serif" font-size="20" font-weight="600" letter-spacing="4">
    SALESFORCE &amp; AGENTFORCE PARTNER
  </text>

  <text x="80" y="290" fill="#FFFFFF" font-family="Inter, system-ui, sans-serif" font-size="86" font-weight="800" letter-spacing="-2">
    Build Once.
  </text>
  <text x="80" y="390" fill="url(#gold)" font-family="Inter, system-ui, sans-serif" font-size="86" font-weight="800" letter-spacing="-2">
    Deploy Everywhere.
  </text>

  <text x="80" y="465" fill="rgba(186,220,255,0.85)" font-family="Inter, system-ui, sans-serif" font-size="26" font-weight="400">
    Agentforce agents that work 24/7 across Slack,
  </text>
  <text x="80" y="500" fill="rgba(186,220,255,0.85)" font-family="Inter, system-ui, sans-serif" font-size="26" font-weight="400">
    WhatsApp, voice, and every channel.
  </text>

  <text x="80" y="580" fill="#FFFFFF" font-family="Inter, system-ui, sans-serif" font-size="28" font-weight="700">
    cloudsheer.com
  </text>
</svg>
