<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 400">
  <defs>
    <linearGradient id="bg1" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#032D60"/>
      <stop offset="100%" style="stop-color:#0176D3"/>
    </linearGradient>
  </defs>
  <rect width="800" height="400" fill="url(#bg1)" rx="16"/>
  <!-- Grid pattern -->
  <g opacity="0.06" stroke="white" stroke-width="0.5">
    <line x1="0" y1="50" x2="800" y2="50"/><line x1="0" y1="100" x2="800" y2="100"/>
    <line x1="0" y1="150" x2="800" y2="150"/><line x1="0" y1="200" x2="800" y2="200"/>
    <line x1="0" y1="250" x2="800" y2="250"/><line x1="0" y1="300" x2="800" y2="300"/>
    <line x1="0" y1="350" x2="800" y2="350"/>
    <line x1="100" y1="0" x2="100" y2="400"/><line x1="200" y1="0" x2="200" y2="400"/>
    <line x1="300" y1="0" x2="300" y2="400"/><line x1="400" y1="0" x2="400" y2="400"/>
    <line x1="500" y1="0" x2="500" y2="400"/><line x1="600" y1="0" x2="600" y2="400"/>
    <line x1="700" y1="0" x2="700" y2="400"/>
  </g>
  <!-- Robot/Agent icon -->
  <rect x="320" y="100" width="160" height="120" rx="20" fill="white" opacity="0.15"/>
  <rect x="340" y="120" width="120" height="80" rx="12" fill="white" opacity="0.2"/>
  <circle cx="375" cy="155" r="10" fill="#38BDF8"/>
  <circle cx="425" cy="155" r="10" fill="#38BDF8"/>
  <rect x="365" y="175" width="70" height="6" rx="3" fill="#F59E0B"/>
  <!-- Sparkle dots -->
  <circle cx="280" cy="140" r="4" fill="#F59E0B" opacity="0.8"/>
  <circle cx="520" cy="130" r="3" fill="#38BDF8" opacity="0.6"/>
  <circle cx="260" cy="220" r="3" fill="#6366F1" opacity="0.5"/>
  <circle cx="540" cy="240" r="4" fill="#F59E0B" opacity="0.7"/>
  <!-- Text -->
  <text x="400" y="290" text-anchor="middle" fill="white" font-family="Inter,sans-serif" font-size="24" font-weight="800">Getting Started with</text>
  <text x="400" y="325" text-anchor="middle" fill="#F59E0B" font-family="Inter,sans-serif" font-size="28" font-weight="800">Agentforce</text>
  <text x="400" y="360" text-anchor="middle" fill="rgba(186,220,255,0.6)" font-family="Inter,sans-serif" font-size="14">A Practical Guide for 2025</text>
</svg>
